name: Update Publications & Mentions

on:
  schedule:
    # Every 12 hours
    - cron: '0 6,18 * * *'
  workflow_dispatch: # Manual trigger

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch Publications
        run: node scripts/fetch_publications.js
        continue-on-error: true

      - name: Fetch Mentions
        run: node scripts/fetch_mentions.js
        continue-on-error: true

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet data/ && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "chore: auto-update publications & mentions [skip ci]"
          git push
